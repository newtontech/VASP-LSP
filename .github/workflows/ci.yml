name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "editors/vscode/extension.ts"
      - "editors/vscode/language-configuration.json"
      - "editors/vscode/package-lock.json"
      - "editors/vscode/package.json"
      - "editors/vscode/snippets/**"
      - "editors/vscode/syntaxes/**"
      - "editors/vscode/tsconfig.json"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "editors/vscode/extension.ts"
      - "editors/vscode/language-configuration.json"
      - "editors/vscode/package-lock.json"
      - "editors/vscode/package.json"
      - "editors/vscode/snippets/**"
      - "editors/vscode/syntaxes/**"
      - "editors/vscode/tsconfig.json"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests -q

  smoke-test:
    name: Install and import smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from scratch
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Verify import and --version
        run: |
          python -c "from vasp_lsp import __version__; print('package version:', __version__)"
          vasp-lsp --version

  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check formatting
        run: python -m black --check .

      - name: Run mypy
        run: python -m mypy src tests

      - name: Run coverage
        run: >
          python -m pytest tests -q
          --cov=src/vasp_lsp
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=95

  vscode-extension:
    name: VS Code extension
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: editors/vscode

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile
